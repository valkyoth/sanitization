name: Miri Verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  MIRI_TOOLCHAIN: nightly

jobs:
  miri:
    name: Miri interpreter tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install nightly Rust with Miri
        run: |
          rustup set profile minimal
          rustup toolchain install "$MIRI_TOOLCHAIN" --component miri
          rustup +"$MIRI_TOOLCHAIN" component add rust-src

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Miri verification
        run: scripts/verify-miri.sh
