name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  checks:
    name: Format, lint, test, and package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: scripts/ci_install_rust.sh

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run checks
        run: scripts/checks.sh

  platform:
    name: Platform tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: scripts/ci_install_rust.sh

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test default features
        run: cargo test --all-targets

      - name: Test all features
        run: cargo test --all-targets --all-features

      - name: Check no_std library build
        run: cargo check --no-default-features --lib

  target-build:
    name: no_std target build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - wasm32-unknown-unknown
          - thumbv7em-none-eabihf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: scripts/ci_install_rust.sh

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check no_std library build
        run: cargo check --no-default-features --lib --target ${{ matrix.target }}
